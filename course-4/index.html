<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4 курс — Портфолио</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="top-bar">
    <a href="../" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      На главную
    </a>
    <nav class="page-nav">
      <a href="../about/">Обо мне</a>
      <a href="../course-1/">1 курс</a>
      <a href="../course-2/">2 курс</a>
      <a href="../course-3/">3 курс</a>
      <a href="../course-4/" class="active">4 курс</a>
      <a href="../practice/">Практика</a>
    </nav>
  </div>

  <main class="page-content">
    <div class="course-header">
      <span class="course-badge">4</span>
      <h1>4 курс</h1>
    </div>

    <div class="subjects">

      <div class="subject">
        <button class="subject-toggle" aria-expanded="true">
          <span>Машинное обучение</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="subject-body">
          <div class="works-grid">
            <div class="work-card"><div class="work-card-icon">🤖</div><div class="work-card-info"><h4>Нейронная сеть</h4><p>Описание работы</p><a href="#" class="work-link">Открыть →</a></div></div>
          </div>
        </div>
      </div>

      <div class="subject">
        <button class="subject-toggle" aria-expanded="false">
          <span>Дипломная работа</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="subject-body" style="display:none;">
          <div class="works-grid">
            <div class="work-card"><div class="work-card-icon">🎓</div><div class="work-card-info"><h4>ВКР</h4><p>Описание работы</p><a href="#" class="work-link">Открыть →</a></div></div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <p>© 2026 · РГПУ им. А.&nbsp;И.&nbsp;Герцена · Радмир Ибрагимов</p>
  </footer>

  <script src="../js/accordion.js"></script>
</body>
</html>
